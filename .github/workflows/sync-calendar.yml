name: Sync Google Calendars

on:
  schedule:
    - cron: "0 8 * * *"
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      mode:
        description: "Action to run"
        required: true
        default: "sync"
        type: choice
        options:
          - sync
          - cleanup
  repository_dispatch:
    types: [sync-calendar, cleanup-calendar]

permissions:
  contents: write

concurrency:
  group: calendar-sync-bot
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      - name: Run tests
        run: pytest -q

      - name: Run calendar sync
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          SOURCE_CALENDAR_IDS: ${{ secrets.SOURCE_CALENDAR_IDS }}
          DESTINATION_CALENDAR_ID: ${{ secrets.DESTINATION_CALENDAR_ID }}
          DAYS_AHEAD: ${{ secrets.DAYS_AHEAD }}
          TIMEZONE: ${{ secrets.TIMEZONE }}
        run: python -m calendar_sync.main

      - name: Cleanup synced destination events
        if: ${{ (github.event_name == 'workflow_dispatch' && inputs.mode == 'cleanup') || github.event.action == 'cleanup-calendar' }}
        env:
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          GOOGLE_REFRESH_TOKEN: ${{ secrets.GOOGLE_REFRESH_TOKEN }}
          SOURCE_CALENDAR_IDS: ${{ secrets.SOURCE_CALENDAR_IDS }}
          DESTINATION_CALENDAR_ID: ${{ secrets.DESTINATION_CALENDAR_ID }}
          DAYS_AHEAD: ${{ vars.DAYS_AHEAD || '60' }}
          TIMEZONE: ${{ vars.TIMEZONE || 'Europe/Madrid' }}
          EVENT_OWNER_NAME: ${{ vars.EVENT_OWNER_NAME || 'Mónica' }}
          STATE_FILE: state/calendar_sync_state.json
        run: python -m calendar_sync.cleanup

      - name: Persist sync state
        run: |
          if [ -n "$(git status --porcelain state/calendar_sync_state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add state/calendar_sync_state.json
            git commit -m "Update calendar sync state [skip ci]"
            git pull --rebase --autostash
            git push
          else
            echo "No state changes to commit."
          fi
